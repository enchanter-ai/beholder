name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  enchanter:
    name: Enchanter (MCP client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/enchanter
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/enchanter/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  enchanter-windows:
    name: Enchanter (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client/enchanter
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/enchanter/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
